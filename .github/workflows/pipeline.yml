name: Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install dependencies
        run: npm install --no-audit --no-fund --no-optional
      - name: Linter
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Tests
        run: npm run test


